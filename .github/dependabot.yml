version: 2
updates:

    # Config for backend-dependencies
    -   package-ecosystem: "gradle"
        directory: "/"
        schedule:
            interval: "monthly"
        groups:
            backend-dependencies:
                patterns:
                    - "*"
                update-types:
                    - "patch"
                    - "minor"
                    - "major"

    # Config for GitHub Actions (keeps SHA pins and version comments fresh)
    -   package-ecosystem: "github-actions"
        directory: "/"
        schedule:
            interval: "monthly"
        groups:
            github-actions:
                patterns:
                    - "*"
                update-types:
                    - "patch"
                    - "minor"
                    - "major"
